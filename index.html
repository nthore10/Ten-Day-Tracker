<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10-Day Contract Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:#0A0A0A;--accent:#C8102E;--accent-light:#FFF0F2;--surface:#FFFFFF;
    --surface-2:#F5F4F0;--surface-3:#EDECEA;--ink:#0A0A0A;--ink-secondary:#5A5A5A;
    --ink-muted:#9A9A9A;--border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.22);
    --success:#1A7A4A;--success-bg:#EBF8F1;--info:#1E5FA8;--info-bg:#EBF2FC;
    --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-2);color:var(--ink);min-height:100vh;}
  .masthead{background:var(--primary);padding:20px 24px 18px;display:flex;align-items:center;justify-content:center;text-align:center;border-bottom:3px solid var(--accent);}
  .masthead-wordmark{font-family:var(--font-display);font-size:32px;color:#fff;letter-spacing:1.5px;line-height:1;}
  .masthead-wordmark span{color:var(--accent);}
  .masthead-sub{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:2px;padding-bottom:3px;}
  .legend{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:24px;}
  .counter{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);}
  .counter span{font-family:var(--font-display);font-size:22px;color:var(--accent);margin:0 4px;vertical-align:middle;}
  .hardship-note{font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:1px;}
  .hardship-dot{color:var(--info);}
  .loading{display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:14px;}
  .spinner{width:32px;height:32px;border:3px solid var(--surface-3);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);}
  .table-wrapper{overflow-x:auto;padding:0 0 40px;}
  table{border-collapse:collapse;width:100%;}
  thead th{position:sticky;top:0;z-index:15;background:var(--primary);font-family:var(--font-mono);font-weight:500;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.55);padding:13px 14px 11px;text-align:left;white-space:nowrap;border-bottom:2px solid var(--accent);user-select:none;cursor:pointer;transition:color .15s;}
  thead th:hover{color:#fff;}
  thead th.sort-active{color:#fff;}
  thead th.sort-active .sort-arrow{color:var(--accent);}
  thead th .sort-arrow{font-size:8px;margin-left:3px;opacity:.4;}
  thead th.align-right{text-align:right;}
  thead th.align-center{text-align:center;}
  tbody tr{border-bottom:1px solid var(--border);background:var(--surface);transition:background .1s;}
  tbody tr:hover{background:var(--surface-2);}
  tbody td{padding:12px 14px;font-size:13px;white-space:nowrap;}
  td.player-cell{font-weight:600;color:var(--ink);}
  td.player-cell .hardship-tag{font-size:10px;font-weight:500;color:var(--info);margin-left:6px;font-family:var(--font-mono);}
  td.team-cell{color:var(--ink-secondary);}
  td.date-cell{font-family:var(--font-mono);font-size:12px;color:var(--ink-secondary);}
  td.days-cell{font-family:var(--font-mono);font-size:13px;font-weight:600;text-align:center;}
  td.yos-cell{font-family:var(--font-mono);font-size:13px;text-align:center;color:var(--ink-secondary);}
  td.cap-cell{font-family:var(--font-mono);font-size:12px;font-weight:600;text-align:right;}
  .days-active{color:var(--success);}.days-expired{color:var(--ink-muted);}
  @media(max-width:768px){.masthead-wordmark{font-size:22px;}.table-wrapper{padding:0 0 20px;}}
  ::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--surface-2);}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-wordmark"><span>10-DAY</span> CONTRACT TRACKER</div>
  
</div>

<div class="legend">
  <div class="counter">10-Day Contracts:<span id="tenDayCount">0</span></div>
  <div class="hardship-note"><span class="hardship-dot">*</span> Denotes Hardship</div>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div><p>Loading&hellip;</p></div>
</div>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRTwTOS_rNBYI8d8zDUivGFWXsXcxlOZgrqn5o-WCvFC5aNAR3vLsSqllE7aO0BRw/pub?gid=2125971386&single=true&output=csv';
const FALLBACK_B64='UGxheWVyLFRlYW0sU3RhcnQgRGF0ZSxFbmQgRGF0ZSxEYXlzIExlZnQsWWVhcnMgb2YgU2VydmljZSxDYXAgSGl0';

let allRows=[],sortCol=0,sortAsc=true;

function parseCSV(text){
  const lines=text.trim().split('\n');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=[];let cur='',inQ=false;
    for(const ch of lines[i]){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=ch;}
    vals.push(cur.trim());
    if(!vals[0])continue;
    rows.push({player:vals[0],team:vals[1]||'',start:vals[2]||'',end:vals[3]||'',daysLeft:parseInt(vals[4])||0,yos:vals[5]||'',capHit:vals[6]||''});
  }
  return rows;
}

function formatCap(s){if(!s||s.trim()===''||s.trim()==='-')return'—';const n=parseFloat(s.replace(/[$,\s]/g,''));return isNaN(n)?s:'$'+n.toLocaleString('en-US',{maximumFractionDigits:0});}

function isHardship(player){return player.includes('*');}

function render(data){
  document.getElementById('tenDayCount').textContent=data.length;
  if(!data.length){document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:var(--ink-muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase">No active 10-day contracts</div>';return;}
  let html=`<div class="table-wrapper"><table><thead><tr>
    <th onclick="doSort(0)">Player <span class="sort-arrow">⇅</span></th>
    <th onclick="doSort(1)">Team <span class="sort-arrow">⇅</span></th>
    <th onclick="doSort(2)">Start Date <span class="sort-arrow">⇅</span></th>
    <th onclick="doSort(3)">End Date <span class="sort-arrow">⇅</span></th>
    <th class="align-center" onclick="doSort(4)">Days Left <span class="sort-arrow">⇅</span></th>
    <th class="align-center" onclick="doSort(5)">YOS <span class="sort-arrow">⇅</span></th>
    <th class="align-right" onclick="doSort(6)">Cap Hit <span class="sort-arrow">⇅</span></th>
  </tr></thead><tbody>`;
  data.forEach(r=>{
    const hardship=isHardship(r.player);
    const playerName=r.player.replace('*','');
    html+=`<tr>
      <td class="player-cell">${playerName}${hardship?'<span class="hardship-tag">*</span>':''}</td>
      <td class="team-cell">${r.team}</td>
      <td class="date-cell">${r.start}</td>
      <td class="date-cell">${r.end}</td>
      <td class="days-cell ${r.daysLeft>0?'days-active':'days-expired'}">${r.daysLeft}</td>
      <td class="yos-cell">${r.yos}</td>
      <td class="cap-cell">${formatCap(r.capHit)}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('app').innerHTML=html;
}

function doSort(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}
  const sorted=[...allRows].sort((a,b)=>{
    const keys=['player','team','start','end','daysLeft','yos','capHit'];
    const k=keys[col];
    let av=a[k],bv=b[k];
    if(col===4)return sortAsc?av-bv:bv-av;
    av=(av||'').toString().toLowerCase();bv=(bv||'').toString().toLowerCase();
    return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
  });
  render(sorted);
}

async function init(){
  try{
    const resp=await fetch(CSV_URL);
    if(!resp.ok)throw new Error();
    allRows=parseCSV(await resp.text());
    render(allRows);
  }catch(e){
    try{allRows=parseCSV(atob(FALLBACK_B64));render(allRows);}
    catch(e2){document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px;color:var(--accent)">Failed to load data.</div>';}
  }
}
init();
</script>
</body>
</html>
